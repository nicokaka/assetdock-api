spring:
  datasource:
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
  main:
    banner-mode: "off"
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
app:
  surface:
    public-docs-enabled: true
logging:
  level:
    root: WARN
    org.springframework.test.context: INFO
