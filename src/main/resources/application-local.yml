spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/assetdock}
    username: ${DB_USERNAME:assetdock}
    password: ${DB_PASSWORD}
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
app:
  surface:
    public-docs-enabled: true
    allowed-origins: ${LOCAL_FRONTEND_ORIGINS:http://localhost:3000,http://localhost:5173}
  seed:
    enabled: ${LOCAL_SEED_ENABLED:false}
    organization-name: ${LOCAL_SEED_ORG_NAME:}
    organization-slug: ${LOCAL_SEED_ORG_SLUG:}
    admin-full-name: ${LOCAL_SEED_ADMIN_FULL_NAME:}
    admin-email: ${LOCAL_SEED_ADMIN_EMAIL:}
    admin-password: ${LOCAL_SEED_ADMIN_PASSWORD:}
