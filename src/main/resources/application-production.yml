spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  surface:
    public-docs-enabled: false
    allowed-origins: ${FRONTEND_URL:}
  seed:
    enabled: ${SEED_ENABLED:false}
    organization-name: ${SEED_ORG_NAME:}
    organization-slug: ${SEED_ORG_SLUG:}
    admin-full-name: ${SEED_ADMIN_FULL_NAME:}
    admin-email: ${SEED_ADMIN_EMAIL:}
    admin-password: ${SEED_ADMIN_PASSWORD:}

security:
  web-session:
    secure-cookies: true
    same-site: ${WEB_SESSION_COOKIE_SAME_SITE:None}
