spring:
  application:
    name: assetdock-api
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: true
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: assetdock-hikari
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
management:
  endpoints:
    web:
      discovery:
        enabled: false
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    enabled: false
    path: /v3/api-docs
  show-actuator: false
app:
  surface:
    public-docs-enabled: ${PUBLIC_DOCS_ENABLED:false}
info:
  app:
    name: ${spring.application.name}
    description: Multi-tenant asset inventory API scaffold
    version: ${APP_VERSION:0.1.0-SNAPSHOT}
logging:
  level:
    root: INFO
    org.springframework.security: INFO
security:
  auth:
    max-failed-login-attempts: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:5}
  jwt:
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:assetdock-api}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
  throttle:
    login:
      enabled: ${LOGIN_THROTTLE_ENABLED:true}
      max-requests: ${LOGIN_THROTTLE_MAX_REQUESTS:10}
      window: ${LOGIN_THROTTLE_WINDOW:PT1M}
      max-tracked-clients: ${LOGIN_THROTTLE_MAX_TRACKED_CLIENTS:10000}
    asset-import:
      enabled: ${IMPORT_THROTTLE_ENABLED:true}
      max-requests: ${IMPORT_THROTTLE_MAX_REQUESTS:5}
      window: ${IMPORT_THROTTLE_WINDOW:PT5M}
      max-tracked-clients: ${IMPORT_THROTTLE_MAX_TRACKED_CLIENTS:5000}
